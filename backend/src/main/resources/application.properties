# Application
spring.application.name=ecommerce-backend

# -------------------------------------------------------
# Database Configuration
# Defaults use local in-memory H2 for quick startup.
# Set SPRING_DATASOURCE_* env vars to point to MySQL.
# -------------------------------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:ecommerce_db;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

# -------------------------------------------------------
# JPA / Hibernate
# -------------------------------------------------------
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
spring.h2.console.enabled=true

# Load sample data from data.sql on startup
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

